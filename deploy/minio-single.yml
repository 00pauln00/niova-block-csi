apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio-csi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio-csi
  template:
    metadata:
      labels:
        app: minio-csi
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        args:
          - server
          - /data
        env:
          - name: MINIO_ROOT_USER
            value: minioadmin
          - name: MINIO_ROOT_PASSWORD
            value: minioadmin
        ports:
          - containerPort: 9000
        volumeMounts:
          - name: minio-storage
            mountPath: /data
      volumes:
        - name: minio-storage
          persistentVolumeClaim:
            claimName: minio-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: niova-csi-sc  # Your CSI StorageClass
  resources:
    requests:
      storage: 1Ti
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: niova-csi-sc
provisioner: csi.niova.com
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete

